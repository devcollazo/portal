<div class="home-shell">
  <header class="hero">
    <div>
      <p class="eyebrow">Portal en construcción</p>
      <h1>Portal de desarrollador y contenido.</h1>
      <p class="subtitle">Todo lo que necesito consultar o compartir desde un espacio personal ligero.</p>
    </div>
    <div class="hero-actions">
      <a routerLink="/admin" class="ghost-link">Ir al panel administrador</a>
    </div>
  </header>

  <section class="content-list">
    <article
      class="content-card"
      *ngFor="let item of contents | async; trackBy: trackById"
      role="group"
      [attr.aria-label]="item.title"
    >
      <div class="card-main">
        <figure class="card-thumb">
          <img [src]="item.image" [alt]="item.title" />
        </figure>
        <div class="card-body">
          <div class="card-headline">
            <h3>{{ item.title }}</h3>
            <span class="card-date">{{ item.createdAt | date: 'mediumDate' }}</span>
          </div>
          <p>{{ item.description }}</p>
          <div class="card-actions">
            <div class="card-link-chip">
              <span>{{ item.link }}</span>
            </div>
            <a [href]="item.link" target="_blank" rel="noreferrer" class="btn-green">Ir</a>
          </div>
        </div>
      </div>
    </article>
  </section>
</div>
